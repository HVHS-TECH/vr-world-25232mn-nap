<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:dog.ply"
      position= "0 -50 -4"
      rotation="-90 0 -90"
      scale="1"
      ></a-entity>

      <a-entity 
      ply-model="src:skyisland.ply"
      position="7 -50 0"
      rotation="-90 0 90"
      shadow="receive: true"
      ></a-entity>
      <a-light id="amb" type="ambient" intensity="0.2" ></a-light>
<a-light id="dir" type="directional"></a-light>
<a-light id="pnt" type="point"></a-light>
<a-light id="spt" type="spot"></a-light>   
<a-light light="castShadow: true"></a-light>   
 <a-entity 
      ply-model="src:skyisland(house)-0.ply"
      position="7 -12 0"
      rotation="-90 0 90"
      shadow="receive: true"
      ></a-entity>     
      <a-entity 
      ply-model="src:skyisland(no_house)-0.ply"
      position="7 -11.7 0"
      rotation="-90 0 90"
      shadow="receive: true"
      ></a-entity>     
    </a-scene>
  </body>
</html>
